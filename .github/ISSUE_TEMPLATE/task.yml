name: Task
description: Engineering task for Cluster Test Mgmt
title: "[Txx] "
labels: ["task"]
body:
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What to build / change
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: Concrete pass/fail checks
    validations:
      required: true
  - type: textarea
    id: refs
    attributes:
      label: Spec References
      description: Link to docs/specs sections
    validations:
      required: true
